name: quran_imam_shahid
description: Personal Quran companion — read, listen, learn tafsir, memorize.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  flutter_riverpod: ^2.5.0
  flutter_secure_storage: ^9.0.0
  just_audio: ^0.9.40
  path_provider: ^2.1.0
  flutter_markdown_plus: ^1.0.1
  sqflite: ^2.3.0
  archive: ^3.6.0
  flutter_animate: ^4.5.0
  intl: any
  scrollable_positioned_list: ^0.3.8
  record: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/tafsir/
    - assets/lexicon/
    - assets/quran/
    - assets/audio/
